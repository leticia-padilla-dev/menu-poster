    <title>Menú especial Fira de la Cirera | Bar Jubilats Serra</title>

      name="description"
      content="Cartel imprimible del menú especial de Bar Jubilats Serra para la Fira de la Cirera, preparado para A4 y GitHub Pages."
    />
    <meta name="author" content="Leticia Padilla" />
    <script>
      (function (location) {
        if (location.search[1] === "/") {
          const decoded = location.search
            .slice(1)
            .split("&")
            .map((segment) => segment.replace(/~and~/g, "&"))
            .join("?");

          window.history.replaceState(null, "", location.pathname.slice(0, -1) + decoded + location.hash);
        }
      })(window.location);
    </script>
